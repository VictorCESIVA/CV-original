<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Victor NOEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:  #00ff88;
            --cyan:   #00e5ff;
            --pink:   #ff2d78;
            --orange: #ff9500;
            --purple: #bd53ed;
            --yellow: #ffe600;
            --bg:     #080c14;
            --bg2:    #0d1421;
            --text:   #cdd6f4;
            --dim:    #6b7fa3;
            --border: #1e2d45;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            line-height: 1.6;
            overflow-x: hidden;
            cursor: none;
        }

        /* === CUSTOM CURSOR === */
        #cursor {
            width: 12px; height: 12px;
            border: 2px solid var(--cyan);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s, background 0.1s;
            mix-blend-mode: difference;
        }
        #cursor-trail {
            width: 30px; height: 30px;
            border: 1px solid rgba(0,229,255,0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: left 0.12s ease, top 0.12s ease;
        }

        /* === BACKGROUND GRID === */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* === ANIMATED GRADIENT GLOW === */
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%);
            top: -200px; left: -200px;
            animation: glowMove 15s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes glowMove {
            0%   { transform: translate(0, 0); }
            33%  { transform: translate(60vw, 30vh); background: radial-gradient(circle, rgba(255,45,120,0.05) 0%, transparent 70%); }
            66%  { transform: translate(20vw, 70vh); background: radial-gradient(circle, rgba(189,83,237,0.05) 0%, transparent 70%); }
            100% { transform: translate(80vw, 10vh); background: radial-gradient(circle, rgba(0,255,136,0.04) 0%, transparent 70%); }
        }

        /* === SCANLINE === */
        .scanline {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
            pointer-events: none; z-index: 5;
        }
        .scanline-sweep {
            position: fixed; left: 0; right: 0; height: 120px;
            background: linear-gradient(transparent, rgba(0,229,255,0.04), transparent);
            animation: sweep 10s linear infinite;
            pointer-events: none; z-index: 6;
        }
        @keyframes sweep { from { top: -120px; } to { top: 100vh; } }

        /* === TERMINAL WINDOW === */
        #terminal-wrap {
            position: relative; z-index: 10;
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px 60px;
        }

        /* Top bar */
        #topbar {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dot { width: 13px; height: 13px; border-radius: 50%; }
        .dot-red   { background: #ff5f57; }
        .dot-yellow{ background: #febc2e; }
        .dot-green { background: #28c840; }
        #topbar-title {
            margin-left: auto; margin-right: auto;
            color: var(--dim);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Main terminal body */
        #terminal-body {
            background: rgba(8, 12, 20, 0.95);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 30px;
            min-height: 75vh;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(0,229,255,0.05), 0 0 120px rgba(0,0,0,0.8);
        }

        /* === ASCII HEADER === */
        .ascii-art {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            line-height: 1.15;
            white-space: pre;
            background: linear-gradient(90deg, var(--cyan), var(--green), var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 24px;
            animation: gradShift 4s ease infinite;
            background-size: 200% 200%;
        }
        @keyframes gradShift {
            0%, 100% { background-position: 0% 50%; }
            50%       { background-position: 100% 50%; }
        }

        @media (max-width: 600px) {
            .ascii-art { font-size: 4.5px; line-height: 1.1; }
        }

        /* === OUTPUT LINES === */
        .command-output {
            margin-bottom: 16px;
            white-space: pre-wrap;
            animation: fadeSlide 0.2s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* === INPUT LINE === */
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 8px;
            gap: 10px;
        }
        .hidden-input { opacity: 0; pointer-events: none; }

        .prompt {
            color: var(--purple);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(189,83,237,0.6);
            white-space: nowrap;
        }
        .prompt-at  { color: var(--dim); }
        .prompt-dir { color: var(--cyan); }

        input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            flex-grow: 1;
            outline: none;
            caret-color: var(--cyan);
        }

        /* === SECTION HEADERS === */
        .section-title {
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,229,255,0.4);
        }

        /* === COLORED TEXT HELPERS === */
        .c-green  { color: var(--green);  text-shadow: 0 0 6px rgba(0,255,136,0.4); }
        .c-cyan   { color: var(--cyan);   text-shadow: 0 0 6px rgba(0,229,255,0.4); }
        .c-pink   { color: var(--pink);   text-shadow: 0 0 6px rgba(255,45,120,0.4); }
        .c-orange { color: var(--orange); text-shadow: 0 0 6px rgba(255,149,0,0.4); }
        .c-purple { color: var(--purple); text-shadow: 0 0 6px rgba(189,83,237,0.4); }
        .c-yellow { color: var(--yellow); text-shadow: 0 0 6px rgba(255,230,0,0.4); }
        .c-dim    { color: var(--dim); }
        .c-white  { color: #fff; font-weight: 600; }
        .error    { color: var(--pink); text-shadow: 0 0 6px rgba(255,45,120,0.5); }

        /* === TAGS / BADGES === */
        .tag {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 2px 3px 2px 0;
        }
        .tag-green  { background: rgba(0,255,136,0.12); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
        .tag-cyan   { background: rgba(0,229,255,0.12); color: var(--cyan); border: 1px solid rgba(0,229,255,0.3); }
        .tag-pink   { background: rgba(255,45,120,0.12); color: var(--pink); border: 1px solid rgba(255,45,120,0.3); }
        .tag-orange { background: rgba(255,149,0,0.12); color: var(--orange); border: 1px solid rgba(255,149,0,0.3); }
        .tag-purple { background: rgba(189,83,237,0.12); color: var(--purple); border: 1px solid rgba(189,83,237,0.3); }

        /* === PROGRESS BAR === */
        .skill-row { display: flex; align-items: center; gap: 12px; margin: 5px 0; }
        .skill-name { min-width: 110px; color: var(--text); font-size: 13px; }
        .skill-bar  { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .skill-fill {
            height: 100%;
            border-radius: 3px;
            animation: fillBar 1s ease forwards;
            transform-origin: left;
        }
        @keyframes fillBar { from { width: 0 !important; } }
        .skill-pct  { min-width: 36px; font-size: 12px; color: var(--dim); text-align: right; }

        /* === CARD-STYLE PROJECT === */
        .project-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(13,20,33,0.7);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .project-card:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0,229,255,0.08);
        }
        .project-title { color: var(--cyan); font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .project-desc  { color: var(--dim); font-size: 13px; margin-bottom: 8px; }

        /* === CERT BADGE === */
        .cert-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, rgba(255,230,0,0.1), rgba(255,149,0,0.1));
            border: 1px solid rgba(255,230,0,0.3);
            border-radius: 8px;
            padding: 8px 14px;
            margin: 6px 0;
        }
        .cert-score { font-size: 22px; font-weight: 900; color: var(--yellow); font-family: 'Orbitron', sans-serif; }
        .cert-info  { font-size: 12px; color: var(--dim); }
        .cert-name  { color: #fff; font-weight: 600; }

        /* === AVATAR AREA === */
        .avatar-section {
            display: flex; align-items: flex-start; gap: 24px;
            padding: 16px 0;
        }
        .avatar-box {
            width: 80px; height: 80px; border-radius: 12px;
            border: 2px solid var(--cyan);
            background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(189,83,237,0.2));
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            box-shadow: 0 0 20px rgba(0,229,255,0.2);
            flex-shrink: 0;
        }
        .avatar-info { flex: 1; }
        .avatar-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px; font-weight: 900;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .avatar-role { color: var(--green); font-size: 13px; margin: 4px 0; }
        .avatar-links { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .social-link {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px; font-size: 12px;
            text-decoration: none; font-weight: 600; transition: all 0.2s;
        }
        .social-link:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .sl-github   { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .sl-linkedin { background: rgba(0,119,181,0.2); color: #4db8ff; border: 1px solid rgba(0,119,181,0.4); }
        .sl-cv       { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }

        a { color: var(--cyan); text-decoration: none; }
        a:hover { color: var(--green); text-decoration: underline; }

        /* === INTERESTS === */
        .interest-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .interest-item {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 20px; padding: 4px 12px; font-size: 13px; color: var(--text);
            transition: all 0.2s;
        }
        .interest-item:hover { border-color: var(--purple); color: var(--purple); }

        /* === SOFT SKILLS === */
        .softskill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

        /* === TIMELINE === */
        .timeline-item { display: flex; gap: 16px; margin: 10px 0; }
        .timeline-dot {
            width: 10px; height: 10px; border-radius: 50%;
            margin-top: 6px; flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }
        .timeline-date { color: var(--dim); font-size: 12px; white-space: nowrap; }
        .timeline-content { flex: 1; }

        /* === HELP TABLE === */
        .help-grid { display: grid; grid-template-columns: 120px 1fr; gap: 4px 16px; margin-top: 6px; }
        .help-cmd  { color: var(--cyan); font-weight: 700; }
        .help-desc { color: var(--dim); font-size: 13px; }

        /* === BOOT ANIMATION === */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 1s step-end infinite; }

        /* === MATRIX RAIN (easter egg) === */
        #matrix-canvas {
            position: fixed; inset: 0; z-index: 100;
            display: none; pointer-events: none;
        }

        /* === GLITCH === */
        @keyframes glitch {
            0%   { clip-path: inset(0 0 95% 0); transform: translate(-3px, 0); }
            20%  { clip-path: inset(50% 0 30% 0); transform: translate(3px, 0); }
            40%  { clip-path: inset(20% 0 60% 0); transform: translate(-2px, 0); }
            60%  { clip-path: inset(80% 0 5% 0); transform: translate(2px, 0); }
            80%  { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 0); }
            100% { clip-path: inset(0 0 95% 0); transform: translate(0, 0); }
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            #terminal-body { padding: 18px; }
            .avatar-section { flex-direction: column; }
            .help-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

const input    = document.getElementById('commandInput');

// --- Custom cursor ---
const cur  = document.getElementById('cursor');
const curT = document.getElementById('cursor-trail');
document.addEventListener('mousemove', e => {
    cur.style.left  = (e.clientX - 6) + 'px';
    cur.style.top   = (e.clientY - 6) + 'px';
    curT.style.left = (e.clientX - 15) + 'px';
    curT.style.top  = (e.clientY - 15) + 'px';
});

// --- Typewriter (fast) ---
function typeWriter(element, html, speed = 2, callback) {
    let i = 0;
    isTyping = true;
    inputLine.classList.add('hidden-input');
    element.innerHTML = '';

    function type() {
        if (i < html.length) {
            if (html[i] === '<') {
                const end = html.indexOf('>', i);
                if (end !== -1) { element.innerHTML += html.slice(i, end + 1); i = end + 1; }
                else { element.innerHTML += html[i++]; }
            } else {
                element.innerHTML += html[i++];
            }
            window.scrollTo(0, document.body.scrollHeight);
            setTimeout(type, Math.random() * speed);
        } else {
            isTyping = false;
            inputLine.classList.remove('hidden-input');
            input.focus();
            if (callback) callback();
        }
    }
    type();
}

// --- Instant render (for HTML-heavy sections) ---
function renderInstant(element, html) {
    element.innerHTML = html;
    isTyping = false;
    inputLine.classList.remove('hidden-input');
    input.focus();
    window.scrollTo(0, document.body.scrollHeight);
}

            isTyping = false;
            inputLine.classList.remove('hidden-input');
            break;
        default:
            typeWriter(div, `<span class="error">Commande inconnue : '${cmd}'</span> ‚ÄĒ Tapez <span class="c-cyan">help</span> pour la liste.`, 3);
    }
}

// =============================================
//  MATRIX RAIN
// =============================================
function startMatrix() {
    const canvas = document.getElementById('matrix-canvas');
    canvas.style.display = 'block';
    canvas.style.opacity = '0.85';
    const ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const cols = Math.floor(canvas.width / 18);
    const drops = Array(cols).fill(1);
    const chars = '„āĘ„ā§„ā¶„ā®„ā™„āę„ā≠„āĮ„āĪ„ā≥„āĶ„ā∑„āĻ„āĽ„āĹ„āŅ„ÉĀ„ÉĄ„ÉÜ„Éą„Éä„Éč„ÉĆ„Éć„Éé„ÉŹ„Éí„Éē„Éė„ÉõABCDEF0123456789@#$%^&*()';

    matrixInterval = setInterval(() => {
        ctx.fillStyle = 'rgba(8,12,20,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = '14px JetBrains Mono';
        drops.forEach((y, i) => {
            const ch = chars[Math.floor(Math.random() * chars.length)];
            const grad = i / cols;
            ctx.fillStyle = grad < 0.3 ? '#00ff88' : grad < 0.6 ? '#00e5ff' : '#bd53ed';
            ctx.fillText(ch, i * 18, y * 18);
            if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }, 33);

    setTimeout(() => {
        clearInterval(matrixInterval);
        canvas.style.display = 'none';
        addLine(`<span class="c-green">// Matrix d√©sactiv√©e. Retour au terminal.</span>`);
    }, 5000);
}
